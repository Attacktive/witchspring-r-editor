name: 'Release'
on:
  push:
    tags:
      - '**'
jobs:
  release:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v6'
      - name: 'Create Release'
        uses: 'softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332'
        with:
          generate_release_notes: true
